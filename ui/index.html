<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web Navigator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <nav id="toolbar">
      <button id="btn-back" title="Back" disabled>&#9664;</button>
      <button id="btn-forward" title="Forward" disabled>&#9654;</button>
      <button id="btn-reload" title="Reload" disabled>&#8635;</button>
      <div id="address-bar">
        <input
          type="text"
          id="url-input"
          placeholder="Enter web address..."
          spellcheck="false"
          autofocus
        />
      </div>
      <button id="btn-go" title="Go">&#10132;</button>
    </nav>

    <div id="status-bar">
      <span id="status-text">Ready</span>
      <span id="status-url"></span>
    </div>

    <main id="content-area">
      <div id="welcome">
        <h1>Web Navigator</h1>
        <p>Enter a web address above to get started.</p>
        <div id="welcome-examples">
          <p>Try:</p>
          <ul>
            <li><a href="#" class="quick-link" data-url="example.com">example.com</a></li>
            <li><a href="#" class="quick-link" data-url="info.cern.ch">info.cern.ch</a></li>
          </ul>
        </div>
      </div>
      <div id="error-display" class="hidden">
        <h2>Navigation Error</h2>
        <p id="error-message"></p>
      </div>
      <iframe id="web-view" class="hidden" sandbox="allow-same-origin allow-scripts allow-forms"></iframe>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
